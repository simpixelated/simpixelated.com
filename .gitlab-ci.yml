image: docker:latest

services:
  - docker:dind


# execute Ghost Inspector suite
ghost_inspector_test:
  script:
    - docker run -d --name my-app node:12-alpine npm install && npm run build && npm start &
    - docker run -e GI_SUITE=5c1d24568ec4123e847a9ecd -e APP_PORT=my-app:3000 ghostinspector/test-runner-standalone

