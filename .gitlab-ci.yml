image: "node:12-alpine"
#options: --network-alias node-app

before_script:
  - npm install
  - npm run build

# execute Ghost Inspector suite
ghost_inspector_test:
  image:
    name: ghostinspector/test-runner-node
    entrypoint: [""]
  variables:
    GI_API_KEY: $GI_API_KEY
    GI_SUITE: 5c1d24568ec4123e847a9ecd
    NGROK_TOKEN: $NGROK_TOKEN
    APP_PORT: node-app:3000
  # script required by GitLab CI/CD, even though this docker image runs without any input
  script:
    - node server.js
