image: "node:12-alpine"
#options: --network-alias node-app

before_script:
  - npm install
  - npm run build
  - npm start &

# execute Ghost Inspector suite
ghost_inspector_test:
  image: ghostinspector/test-runner-node
  variables:
    #GI_API_KEY: ${{ secrets.GI_API_KEY }}
